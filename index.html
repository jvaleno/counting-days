<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Counting days</title>
</head>
<body>
    <div class="container">
        <h1>Counting days</h1>
        <label for="event">To this event:</label>
        <input type="text" id="event" name="event" placeholder="What are we counting down to?">
        <label for="date">On this date:</label>
        <input type="date" id="date" name="date">
        <label for="toggleWorkdays">Only count workdays?</label>
        <input type="checkbox" id="toggleWorkdays" name="toggleWorkdays">
        <p><span id="feedback"></span></p>
    </div>
</body>
<script type="module" src="js/countdown.js"></script>
</html>
